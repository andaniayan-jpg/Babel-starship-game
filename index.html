<!doctype html>
<html>

    <head>

      <title>BABEL - The Starship Game </title>
       <link rel="stylesheet" href="style.css">


     </head>
    <body>

      <h1>Welcome to Babel</h1>


       <div id="topBar">
          <span>Score: <b id="scoreText">0</b></span>
         <span>Lives: <b id="livesText">5</b></span>
          <span>Level: <b id="levelText">1</b></span>
          <span>Kills: <b id="killsText">0</b></span>

        


        </div>

        <div id="buttonPannel">
          <button id="pauseBtn">Start</button>
          <button id="pauseBtn">Pause</button>
          <button id="resumeBtn">Resume</button>
          <button id="restartBtn">Restart</button>
          <button id="helpBtn">Help</button>
          <button id="themeBtn">Change Theme</button>
        </div>

        <div id="difficultyPanel">
          <button id="easyBtn">Easy</button>
          <button id="normalBtn">Normal</button>
          <button id="hardBtn">Hard</button>
        </div>


        <div id="helpBox" class="hidden">
          <h2>How to Play</h2>
          <p>Use arrow keys to move the ship</p>
          <p>pressspace to shoot</p>
          <p>if aliens touch you or pass the bottom, HP descreases</p>
          <p>every 5th level has a big enemy</p>
        </div>

        

        <canvas id="gameCanvas" width="700" height="500"></canvas>


        <p id="message">
          Press ENTER to start. Use arrow keys to mpve and space to shoooot!
        </p>

        <script src="game.js"></script>

    </body>
</html>
